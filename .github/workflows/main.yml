name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出代碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 建議根據您的開發環境調整版本

    - name: 安裝依賴項
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 執行 Lint 檢查 (如有安裝 flake8)
      run: |
        # 這裡會檢查語法錯誤與代碼風格
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: 執行單元測試
      run: |
        # 如果您有撰寫測試腳本，請取消下方註釋或執行 backtest.py 驗證邏輯
        # python backtest.py
        echo "正在跳過測試或執行基礎檢查..."
