name: Alpha Oracle Pro

on:
  schedule:
    - cron: "*/5 * * * *"   # 每 5 分鐘觸發（GitHub 可靠最低間隔），內部循環每分鐘掃描
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alpha-oracle-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    name: 🔮 Alpha Oracle Pro
    runs-on: ubuntu-latest
    timeout-minutes: 9

    steps:
      - name: 📦 下載程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 設置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安裝依賴
        run: pip install --quiet requests tradingview-ta

      - name: 🔍 每分鐘循環掃描（共 4 輪，間隔 60 秒）
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MAX_SIGNALS: "3"
          SETUP_SCORE_THRESHOLD: "75"
          TZ: Europe/London
        run: |
          for i in 1 2 3 4; do
            echo "🔍 第 $i / 4 輪掃描（$(date -u '+%H:%M:%S UTC')）..."
            python main.py || echo "⚠️ 第 $i 輪出錯，繼續下一輪"
            if [ "$i" -lt 4 ]; then
              echo "⏱ 等待 60 秒..."
              sleep 60
            fi
          done

      - name: 💾 提交狀態檔案
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add -A
          if git diff --staged --quiet; then
            echo "✅ 無狀態變更"
          else
            git commit -m "🤖 自動更新狀態 $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push --quiet || git push --force-with-lease --quiet || true
          fi
        continue-on-error: true
