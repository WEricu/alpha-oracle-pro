- name: 💾 提交並推送狀態
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main # 避免衝突
          git add active_signals.json trade_history.json
          git commit -m "🤖 更新交易狀態" || exit 0
          git push origin main
