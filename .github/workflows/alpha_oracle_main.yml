name: Alpha Oracle Pro - Final Fix

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # 每小時執行一次

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 重要：允許機器人更新 JSON 狀態

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Bot
        env:
          PYTHONUNBUFFERED: 1
          # 請在 GitHub Secrets 設定 API_KEY 與 API_SECRET
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
        run: python main.py

      - name: Auto Save State
        if: always()
        run: |
          git config --global user.name "bot-actions"
          git config --global user.email "bot@github.com"
          git add *.json
          git commit -m "Update learning state and trade history [skip ci]" || exit 0
          git push
