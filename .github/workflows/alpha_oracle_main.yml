name: Alpha Oracle Pro Main

on:
  workflow_dispatch:
  push:
    paths:
      - '**.py'

jobs:
  run-pro-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install websockets requests pandas # 根據 Pro 版功能添加
          # 如果有 ccxt 請加上：pip install ccxt

      - name: Execute Main Bot
        env:
          API_KEY: ${{ secrets.MY_EXCHANGE_KEY }}
          API_SECRET: ${{ secrets.MY_EXCHANGE_SECRET }}
        run: python main.py

      - name: Auto Commit State Updates
        run: |
          git config --global user.name "Bot-Auto-Updater"
          git config --global user.email "bot@actions.com"
          git add *.json
          git commit -m "Update robot learning state and trade history [skip ci]" || exit 0
          git push
