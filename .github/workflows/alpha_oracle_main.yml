name: Alpha Oracle Bot Run

on:
  workflow_dispatch: # 允許您在 GitHub 介面手動點擊 "Run workflow" 啟動
  schedule:
    - cron: '0 * * * *' # 可選：每小時自動檢查一次

jobs:
  launch-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 檢查是否有 requirements.txt，若無則手動安裝常見依賴
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else
            pip install websockets requests pandas # 根據檔案清單推測的基礎依賴
          fi

      - name: Run Bot
        env:
          # 如果您的 config.json 裡面需要 API Key，建議透過 Secrets 傳入
          # 範例：EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          PYTHONUNBUFFERED: 1
        run: python main.py
