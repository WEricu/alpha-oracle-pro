name: Alpha Oracle Bot Run

on:
  workflow_dispatch: # 允許您在 GitHub 介面手動點擊 "Run workflow" 啟動
  schedule:
    - cron: '0 * * * *' # 可選：每小時自動檢查一次

jobs:
  launch-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

- name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 開啟快取功能，縮短啟動時間

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Bot
        env:
          # 如果您的 config.json 裡面需要 API Key，建議透過 Secrets 傳入
          # 範例：EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          PYTHONUNBUFFERED: 1
        run: python main.py
