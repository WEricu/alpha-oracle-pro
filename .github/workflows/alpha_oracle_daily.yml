name: Alpha Oracle 日報 / 月報

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "手動推日報的日期（YYYY-MM-DD，留空則推昨天）"
        required: false
      month:
        description: "手動推月報的月份（YYYY-MM，留空則跳過月報）"
        required: false

permissions:
  contents: read

jobs:
  reports:
    name: 📊 日報 / 月報
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 📦 下載程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 設置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安裝依賴
        run: pip install --quiet requests tradingview-ta

      - name: 📊 推送日報（昨天）
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TZ: Asia/Taipei
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            TARGET_DATE="${{ github.event.inputs.date }}"
            echo "🔧 手動指定日期：$TARGET_DATE"
          else
            TARGET_DATE=$(TZ=Asia/Taipei date -d 'yesterday' +'%Y-%m-%d')
            echo "📅 自動選定昨日：$TARGET_DATE"
          fi
          python main.py daily "$TARGET_DATE"

      - name: 📊 推送週報（每週日 TW 00:00 自動）
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TZ: Asia/Taipei
        run: |
          # 今天 TW 日期是星期一 (Mon = 1) → 推上週週日為止的週報
          TODAY_DOW=$(TZ=Asia/Taipei date +'%u')
          if [ "$TODAY_DOW" = "1" ]; then
            YESTERDAY=$(TZ=Asia/Taipei date -d 'yesterday' +'%Y-%m-%d')
            echo "📅 週一 TW，自動推上週週報（結束 $YESTERDAY）"
            python main.py weekly "$YESTERDAY"
          else
            echo "今天 TW 不是週一（dow=$TODAY_DOW），跳過週報"
          fi

      - name: 📈 推送月報（每月 1 號自動 / 手動指定）
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TZ: Asia/Taipei
        run: |
          MANUAL_MONTH="${{ github.event.inputs.month }}"
          if [ -n "$MANUAL_MONTH" ]; then
            echo "🔧 手動指定月份：$MANUAL_MONTH"
            python main.py monthly "$MANUAL_MONTH"
          else
            TODAY_DAY=$(TZ=Asia/Taipei date +'%d')
            if [ "$TODAY_DAY" = "01" ]; then
              LAST_MONTH=$(TZ=Asia/Taipei date -d 'yesterday' +'%Y-%m')
              echo "🎉 今天 TW 是 1 號，自動推上月月報：$LAST_MONTH"
              python main.py monthly "$LAST_MONTH"
            else
              echo "今天不是 1 號（TW 日：$TODAY_DAY），跳過月報"
            fi
          fi
