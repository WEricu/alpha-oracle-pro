name: Alpha Oracle 日報 / 月報

on:
  schedule:
    - cron: "0 0 * * *"    # 冬季 GMT：英國 00:00 = UTC 00:00
    - cron: "0 23 * * *"   # 夏季 BST：英國 00:00 = UTC 23:00（前一日）
  workflow_dispatch:
    inputs:
      date:
        description: "手動推日報的日期（YYYY-MM-DD，留空則推昨天）"
        required: false
      month:
        description: "手動推月報的月份（YYYY-MM，留空則跳過月報）"
        required: false

permissions:
  contents: read

jobs:
  reports:
    name: 📊 日報 / 月報
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 📦 下載程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 設置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安裝依賴
        run: pip install --quiet requests tradingview-ta

      - name: 🕐 確認是否英國午夜（自動排程才需要）
        id: check_time
        env:
          TZ: Europe/London
        run: |
          UK_HOUR=$(TZ=Europe/London date +'%H')
          echo "英國目前時刻：${UK_HOUR}:00"
          if [ -n "${{ github.event.inputs.date }}" ] || [ -n "${{ github.event.inputs.month }}" ]; then
            echo "skip_check=false" >> $GITHUB_OUTPUT
            echo "✅ 手動觸發，跳過時間檢查"
          elif [ "$UK_HOUR" = "00" ]; then
            echo "skip_check=false" >> $GITHUB_OUTPUT
            echo "✅ 英國時間 00:xx，執行日報"
          else
            echo "skip_check=true" >> $GITHUB_OUTPUT
            echo "⏭ 英國時間 ${UK_HOUR}:xx，非午夜，跳過"
          fi

      - name: 📊 推送日報（昨天）
        if: steps.check_time.outputs.skip_check != 'true'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TZ: Europe/London
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            TARGET_DATE="${{ github.event.inputs.date }}"
            echo "🔧 手動指定日期：$TARGET_DATE"
          else
            TARGET_DATE=$(TZ=Europe/London date -d 'yesterday' +'%Y-%m-%d')
            echo "📅 自動選定英國昨日：$TARGET_DATE"
          fi
          python main.py daily "$TARGET_DATE"

      - name: 📈 推送月報（每月 1 號自動 / 手動指定）
        if: steps.check_time.outputs.skip_check != 'true'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TZ: Europe/London
        run: |
          MANUAL_MONTH="${{ github.event.inputs.month }}"
          if [ -n "$MANUAL_MONTH" ]; then
            echo "🔧 手動指定月份：$MANUAL_MONTH"
            python main.py monthly "$MANUAL_MONTH"
          else
            TODAY_DAY=$(TZ=Europe/London date +'%d')
            if [ "$TODAY_DAY" = "01" ]; then
              LAST_MONTH=$(TZ=Europe/London date -d 'yesterday' +'%Y-%m')
              echo "🎉 英國時間今天是 1 號，推上月月報：$LAST_MONTH"
              python main.py monthly "$LAST_MONTH"
            else
              echo "今天不是英國 1 號（UK 日：$TODAY_DAY），跳過月報"
            fi
          fi
